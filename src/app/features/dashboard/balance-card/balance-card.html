<article
  class="balance-card"
  [attr.data-state]="person().status"
  [class.is-flipped]="isDetailOpen()"
  role="region"
  [attr.aria-label]="'Saldo di ' + person().name"
>
  <button
    class="balance-card__face balance-card__front"
    type="button"
    [attr.aria-expanded]="isDetailOpen()"
    [attr.aria-controls]="detailId()"
    (click)="openDetail()"
  >
    <span class="balance-card__top">
      <span class="avatar" aria-hidden="true">{{ person().initials.slice(0, 1) }}</span>
      <span class="state-pill">{{ statusLabel() }}</span>
    </span>

    <span class="balance-card__body">
      <span class="balance-card__name">{{ person().name }}</span>
      <span class="balance-card__amount" [attr.aria-label]="formattedAmount() + ' euro'">
        {{ amountPrefix() }}€{{ formattedAmount() }}
      </span>
      <span class="balance-card__hint">Tocca per vedere il calcolo</span>
    </span>

    <span class="balance-card__bar" aria-hidden="true">
      <span></span>
    </span>
  </button>

  <div
    class="balance-card__face balance-card__back"
    [id]="detailId()"
    [attr.aria-hidden]="!isDetailOpen()"
  >
    <h2>{{ person().name }}</h2>
    <dl>
      <div>
        <dt>Carichi</dt>
        <dd>€{{ formattedLoads() }}</dd>
      </div>
      <div>
        <dt>Pagamenti</dt>
        <dd>€{{ formattedPayments() }}</dd>
      </div>
      <div>
        <dt>Saldo</dt>
        <dd>{{ resultLabel() }}</dd>
      </div>
    </dl>
    <button class="balance-card__close" type="button" (click)="closeDetail()">
      Torna al saldo
    </button>
  </div>
</article>
