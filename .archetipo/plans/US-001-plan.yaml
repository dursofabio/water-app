spec_code: US-001
body: |-
  # US-001: Scaffold applicazione Angular con Material e suite di test â€” Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-10

  ---

  ## Spec

  **Epic:** EP-000 â€” Fondazione del Progetto
  **PrioritĂ :** HIGH | **Punti:** 3

  **User Story**
  Come Fabio (gestore e sviluppatore),
  voglio un progetto Angular 22 configurato con Angular Material, routing e suite di test funzionante,
  per avere una base solida e verificabile su cui costruire AcquaApp.

  **Criteri di Accettazione**
  - [ ] `ng serve` avvia l'app e mostra una shell con toolbar Material e titolo "AcquaApp"
  - [ ] `ng test` esegue la suite Jasmine/Karma senza errori
  - [ ] Il routing base Ă¨ configurato con una rotta `/dashboard` placeholder come pagina iniziale
  - [ ] `CLAUDE.md` documenta i comandi di sviluppo (serve, test, build)

  ---

  ## Soluzione Tecnica

  Creazione del progetto Angular 22 nella directory `water-app` esistente usando Angular CLI con standalone components (default v22), aggiunta di Angular Material tramite schematic, configurazione del router con rotta `/dashboard` e shell `AppComponent` con toolbar Material.

  - Eseguire `ng new water-app --directory . --skip-git --routing --style=scss --standalone` per inizializzare il progetto nella root esistente senza sovrascrivere `docs/`
  - Aggiungere Angular Material con `ng add @angular/material` scegliendo un tema prebuilt (es. Indigo/Pink) e abilitando typography e animations
  - Creare `DashboardComponent` standalone come pagina placeholder; configurare `app.routes.ts` con rotta `{ path: '', redirectTo: 'dashboard', pathMatch: 'full' }` e `{ path: 'dashboard', component: DashboardComponent }`
  - Aggiornare `AppComponent` con `<mat-toolbar color="primary">AcquaApp</mat-toolbar>` e `<router-outlet>` nel template; importare `MatToolbarModule` e `RouterOutlet` negli imports standalone
  - Creare `CLAUDE.md` nella root con i comandi: `ng serve`, `ng test`, `ng build`, `firebase deploy` (anticipo per uso futuro)
  - Verificare che `ng test --watch=false` esegua senza errori: tutti i file `.spec.ts` generati da CLI devono passare

  ---

  ## Strategia di Test

  L'obiettivo principale Ă¨ verificare che l'infrastruttura Jasmine/Karma funzioni correttamente e che il componente shell sia renderizzato come atteso â€” questi test costituiscono la garanzia di base per tutti gli sviluppi futuri.

  - Test unitario su `AppComponent`: verifica che il componente venga creato (`should create`) e che il template contenga un elemento `mat-toolbar` con il testo "AcquaApp"
  - Test unitario su `DashboardComponent`: verifica che il componente placeholder venga creato senza errori (`should create`)
  - Eseguire `ng test --watch=false --browsers=ChromeHeadless` come verifica finale CI-ready; tutti i test devono essere verdi prima di chiudere lo spec
  - Nessuna strategia e2e separata per questo spec: i criteri di accettazione visivi (`ng serve` mostra la toolbar) sono coperti dai test unitari sui componenti e da una verifica manuale con `ng serve`

  ---

  _Piano generato tramite ARchetipo Planning â€” 2026-06-10_
tasks:
  - id: TASK-01
    title: Inizializzare progetto Angular 22 nella root
    description: Eseguire `ng new water-app --directory . --skip-git --routing --style=scss --standalone` per creare il progetto Angular 22 nella directory esistente. Verificare che i file `package.json`, `angular.json`, `tsconfig.json` siano presenti e che `docs/` non sia stata toccata.
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Aggiungere Angular Material con tema prebuilt
    description: Eseguire `ng add @angular/material` scegliendo il tema Indigo/Pink, abilitando typography globale e browser animations. Verificare che `@angular/material` sia nelle dipendenze e che il tema sia importato in `styles.scss`.
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
  - id: TASK-03
    title: Creare DashboardComponent placeholder
    description: Generare `ng generate component features/dashboard/dashboard --standalone --flat=false`. Il componente mostra un semplice `<p>Dashboard placeholder</p>`. Questo componente verrĂ  arricchito nelle spec successive.
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-03
  - id: TASK-04
    title: Configurare routing con rotta /dashboard
    description: Aggiornare `app.routes.ts` con redirect da `''` a `dashboard` e lazy-load (o import diretto) di `DashboardComponent`. Verificare che navigando a `/` il browser reindirizzi a `/dashboard`.
    type: Impl
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-04
  - id: TASK-05
    title: Aggiornare AppComponent con toolbar Material
    description: Modificare `app.component.ts` e `app.component.html` per includere `<mat-toolbar color="primary">AcquaApp</mat-toolbar>` e `<router-outlet>`. Importare `MatToolbarModule` e `RouterOutlet` negli imports standalone dell'AppComponent.
    type: Impl
    status: DONE
    dependencies:
      - TASK-02
      - TASK-04
    ref: TASK-05
  - id: TASK-06
    title: Scrivere test unitari per AppComponent
    description: 'Aggiornare `app.component.spec.ts` per verificare: (1) il componente viene creato, (2) il template contiene un `mat-toolbar` con il testo ''AcquaApp''. Configurare il TestBed con `MatToolbarModule` e `RouterTestingModule` (o `provideRouter([])`). Tutti i test devono essere verdi.'
    type: Test
    status: DONE
    dependencies:
      - TASK-05
    ref: TASK-06
  - id: TASK-07
    title: Scrivere test unitari per DashboardComponent
    description: Verificare che `dashboard.component.spec.ts` contenga almeno il test `should create` e che passi senza errori. Aggiungere eventuali import mancanti nel TestBed.
    type: Test
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-07
  - id: TASK-08
    title: Creare CLAUDE.md con comandi di sviluppo
    description: 'Creare `CLAUDE.md` nella root del progetto con sezione ''Comandi di Sviluppo'': `ng serve` (dev server), `ng test` / `ng test --watch=false --browsers=ChromeHeadless` (test), `ng build` (build produzione), `firebase deploy` (deploy). Aggiungere anche la struttura delle directory principali.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-08
