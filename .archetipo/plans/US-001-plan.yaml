    title: 'Verifica finale: ng test e ng serve'
    description: Eseguire `ng test --watch=false --browsers=ChromeHeadless` e verificare che tutti i test passino (zero failures). Documentare l'output nel piano come evidenza. Eseguire `ng serve` e verificare manualmente che la toolbar con 'AcquaApp' sia visibile nel browser.
    type: Test
    status: DONE
    dependencies:
