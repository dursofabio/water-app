body: |-
  #### US-003: Saldi per persona sulla dashboard pubblica

  **Epic:** EP-001 | **Priorità:** HIGH | **Punti:** 5 | **Stato:** TODO
  **Bloccata da:** -

  **User Story**
  Come Fernando (inquilino),
  voglio vedere sulla dashboard pubblica il saldo netto di ciascuna delle 4 persone,
  per sapere quanto devo senza dover chiedere a Fabio.

  **Dimostrazione**
  Dopo l'implementazione, chiunque apre l'URL della dashboard senza login e vede 4 card saldo, una per persona, con l'importo netto aggiornato in tempo reale.

  **Criteri di Accettazione**
  - [ ] La dashboard mostra una card per ciascuna delle 4 persone con saldo netto (positivo = debito, negativo = credito)
  - [ ] Il saldo è calcolato come somma dei costi dei carichi meno somma dei pagamenti della persona
  - [ ] Il saldo si aggiorna in tempo reale quando un carico o pagamento cambia su Firestore, senza ricaricare la pagina
  - [ ] La dashboard è accessibile senza alcun login
  - [ ] Con collezioni vuote, le card mostrano saldo 0 senza errori
