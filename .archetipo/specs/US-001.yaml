body: |-
  #### US-001: Scaffold applicazione Angular con Material e suite di test

  **Epic:** EP-000 | **Priorità:** HIGH | **Punti:** 3 | **Stato:** TODO
  **Bloccata da:** -

  **User Story**
  Come Fabio (gestore e sviluppatore),
  voglio un progetto Angular 22 configurato con Angular Material, routing e suite di test funzionante,
  per avere una base solida e verificabile su cui costruire AcquaApp.

  **Dimostrazione**
  Dopo l'implementazione, uno sviluppatore può eseguire `ng serve` e vedere nel browser la shell dell'app con toolbar Material e titolo "AcquaApp", ed eseguire `ng test` con tutti i test verdi.

  **Criteri di Accettazione**
  - [ ] `ng serve` avvia l'app e mostra una shell con toolbar Material e titolo "AcquaApp"
  - [ ] `ng test` esegue la suite Jasmine/Karma senza errori
  - [ ] Il routing base è configurato con una rotta `/dashboard` placeholder come pagina iniziale
  - [ ] `CLAUDE.md` documenta i comandi di sviluppo (serve, test, build)
