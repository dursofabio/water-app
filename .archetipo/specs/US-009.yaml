body: |-
  #### US-009: Preview costi in tempo reale nel form carico

  **Epic:** EP-003 | **Priorità:** MEDIUM | **Punti:** 2 | **Stato:** TODO
  **Bloccata da:** US-008

  **User Story**
  Come Fabio (gestore),
  voglio vedere nel form l'anteprima dei costi per persona mentre modifico pesi e prezzi,
  per verificare la ripartizione prima di salvare.

  **Dimostrazione**
  Dopo l'implementazione, Fabio cambia un peso nel form e l'anteprima dei costi per persona si aggiorna istantaneamente senza salvare.

  **Criteri di Accettazione**
  - [ ] Il form mostra un riquadro di anteprima con il costo calcolato per ciascuna persona
  - [ ] L'anteprima si aggiorna immediatamente a ogni modifica di pesi o prezzi
  - [ ] La somma dei costi in anteprima coincide con prezzo acqua + prezzo energia
  - [ ] Con somma pesi pari a 0 l'anteprima mostra un avviso invece di valori errati
