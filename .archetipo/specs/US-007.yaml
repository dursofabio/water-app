body: |-
  #### US-007: Protezione rotte admin e logout

  **Epic:** EP-002 | **Priorità:** HIGH | **Punti:** 2 | **Stato:** TODO
  **Bloccata da:** US-006

  **User Story**
  Come Fabio (gestore),
  voglio che le rotte admin siano protette da guard e poter fare logout dal menu,
  per impedire accessi diretti via URL e chiudere la sessione quando voglio.

  **Dimostrazione**
  Dopo l'implementazione, un utente non autenticato che digita l'URL di una rotta admin viene rimandato al login; Fabio autenticato vede la voce di logout nel menu e tornando alla dashboard risulta disconnesso.

  **Criteri di Accettazione**
  - [ ] Tutte le rotte admin sono protette da un guard che richiede utente autenticato e in whitelist
  - [ ] Accesso diretto via URL a una rotta admin senza sessione valida: redirect al login
  - [ ] Il menu admin espone un'azione di logout che termina la sessione e riporta alla dashboard
