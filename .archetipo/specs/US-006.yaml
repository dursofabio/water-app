body: |-
  #### US-006: Login Google con verifica whitelist admin

  **Epic:** EP-002 | **Priorità:** HIGH | **Punti:** 3 | **Stato:** TODO
  **Bloccata da:** -

  **User Story**
  Come Fabio (gestore),
  voglio accedere con il mio account Google e che l'app verifichi il mio UID nella whitelist Firestore `/admins`,
  per essere l'unico a poter modificare i dati condivisi.

  **Dimostrazione**
  Dopo l'implementazione, Fabio clicca "Accedi con Google", completa il popup OAuth2 ed entra nell'area admin; un account non in whitelist viene invece reindirizzato alla dashboard con un messaggio.

  **Criteri di Accettazione**
  - [ ] La pagina di login mostra un pulsante "Accedi con Google" che apre il popup OAuth2
  - [ ] Dopo il login l'app verifica la presenza dell'UID nella collection `/admins`
  - [ ] UID autorizzato: l'utente accede all'area admin
  - [ ] UID non autorizzato: redirect a `/dashboard` con messaggio di accesso negato
