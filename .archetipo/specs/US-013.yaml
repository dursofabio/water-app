body: |-
  #### US-013: Configurazione prezzi acqua ed energia

  **Epic:** EP-005 | **Priorità:** HIGH | **Punti:** 2 | **Stato:** TODO
  **Bloccata da:** -

  **User Story**
  Come Fabio (gestore),
  voglio modificare il prezzo dell'acqua e dell'energia dall'area admin,
  per applicare i nuovi prezzi ai carichi futuri senza alterare quelli passati.

  **Dimostrazione**
  Dopo l'implementazione, Fabio aggiorna il prezzo dell'acqua da 45€ a 35€ nel form di configurazione; i nuovi carichi propongono 35€ mentre i carichi storici mantengono lo snapshot a 45€.

  **Criteri di Accettazione**
  - [ ] Il form admin permette di modificare prezzo acqua (€) e prezzo energia (€) salvati in `/config`
  - [ ] Validazione: prezzi numerici >= 0
  - [ ] I nuovi prezzi vengono proposti nei carichi successivi alla modifica
  - [ ] I carichi già salvati mantengono lo snapshot dei prezzi originali e i saldi storici non cambiano
