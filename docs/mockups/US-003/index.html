<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcquaApp — Saldi Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="top-bar">
      <div class="top-bar__inner">
        <div class="brand">
          <svg class="brand__icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M16 3C16 3 6 13.5 6 20a10 10 0 0020 0C26 13.5 16 3 16 3z" fill="url(#drop)" />
            <defs>
              <linearGradient id="drop" x1="16" y1="3" x2="16" y2="30" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#7dd3fc" />
                <stop offset="100%" stop-color="#0e7490" />
              </linearGradient>
            </defs>
          </svg>
          <span class="brand__name">AcquaApp</span>
        </div>
        <div class="header-meta">
          <span class="live-badge">
            <span class="live-dot"></span>
            Aggiornato in tempo reale
          </span>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="page-content">

      <!-- Section: saldi -->
      <section class="section">
        <div class="section-header">
          <h1 class="section-title">Saldi</h1>
          <span class="section-subtitle">Situazione aggiornata al <time id="last-update">10 giu 2026, 14:32</time></span>
        </div>

        <div class="balance-grid" id="balance-grid">
          <!-- Cards generated by JS for prototype fidelity -->
        </div>
      </section>

      <!-- Section: ultimi carichi (preview) -->
      <section class="section section--secondary">
        <div class="section-header">
          <h2 class="section-title section-title--sm">Ultimi carichi</h2>
          <span class="coming-soon-badge">Prossimamente</span>
        </div>
        <div class="loads-preview">
          <div class="loads-row loads-row--skeleton">
            <span class="loads-row__date skeleton-line" style="width:72px"></span>
            <span class="loads-row__who skeleton-line" style="width:56px"></span>
            <span class="loads-row__amount skeleton-line" style="width:48px"></span>
          </div>
          <div class="loads-row loads-row--skeleton">
            <span class="loads-row__date skeleton-line" style="width:72px"></span>
            <span class="loads-row__who skeleton-line" style="width:56px"></span>
            <span class="loads-row__amount skeleton-line" style="width:48px"></span>
          </div>
          <div class="loads-row loads-row--skeleton">
            <span class="loads-row__date skeleton-line" style="width:72px"></span>
            <span class="loads-row__who skeleton-line" style="width:56px"></span>
            <span class="loads-row__amount skeleton-line" style="width:48px"></span>
          </div>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>AcquaApp &mdash; gestione spese idriche condivise</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
